# ─────────────────────────────────────────────────────────────────────────────
# Eventadex — Render Blueprint
#
# Deploys all 4 services in one click:
#   • eventadex-api     — Express API  (Web Service)
#   • eventadex-master  — Platform admin dashboard  (Static Site)
#   • eventadex-admin   — Event organiser dashboard (Static Site)
#   • eventadex-user    — Public registration app   (Static Site)
#
# HOW TO DEPLOY
# 1. Push this repo to GitHub
# 2. Go to https://dashboard.render.com → New → Blueprint
# 3. Connect your GitHub repo — Render finds this file automatically
# 4. Fill in every value marked sync: false when prompted
# 5. Click "Apply" — all 4 services build and deploy
# 6. After deploy, copy each service's public URL and paste it into the
#    env vars marked "fill after deploy" (see comments below)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Express API ───────────────────────────────────────────────────────────
  - type: web
    name: eventadex-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database ─────────────────────────────────────────────
      - key: MONGO_URI
        sync: false           # MongoDB Atlas → Connect → Drivers → copy URI

      # ── Auth ─────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random value

      # ── Cloudinary (image storage) ───────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Email (Gmail SMTP) ───────────────────────────────────
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_SECURE
        value: false
      - key: EMAIL_USER
        sync: false           # e.g. eventadex@gmail.com
      - key: EMAIL_PASS
        sync: false           # Gmail App Password (16 chars, no spaces)
      - key: EMAIL_FROM
        sync: false           # e.g. Eventadex <eventadex@gmail.com>

      # ── Stripe ───────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false           # sk_live_… or sk_test_…

      # ── reCAPTCHA ────────────────────────────────────────────
      - key: RECAPTCHA_SECRET_KEY
        sync: false

      # ── CORS origins — fill after deploy ─────────────────────
      # After all services are live, paste each site's .onrender.com URL here
      - key: CLIENT_MASTER_URL
        sync: false           # eventadex-master URL, e.g. https://eventadex-master.onrender.com
      - key: CLIENT_ADMIN_URL
        sync: false           # eventadex-admin URL
      - key: CLIENT_USER_URL
        sync: false           # eventadex-user URL

      # ── Public API URL — fill after deploy ───────────────────
      - key: SERVER_URL
        sync: false           # this service's own URL, e.g. https://eventadex-api.onrender.com

  # ── 2. Platform Admin Dashboard (client-master) ──────────────────────────────
  - type: web
    env: static
    name: eventadex-master
    rootDir: client-master
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # ── API URL — fill after deploy ───────────────────────────
      - key: VITE_API_URL
        sync: false           # eventadex-api URL, e.g. https://eventadex-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── 3. Event Organiser Dashboard (client-admin) ──────────────────────────────
  - type: web
    env: static
    name: eventadex-admin
    rootDir: client-admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # ── API URL — fill after deploy ───────────────────────────
      - key: VITE_API_URL
        sync: false           # eventadex-api URL
      # ── User app URL — fill after deploy ─────────────────────
      - key: VITE_USER_APP_URL
        sync: false           # eventadex-user URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── 4. Public Registration App (client-user) ─────────────────────────────────
  - type: web
    env: static
    name: eventadex-user
    rootDir: client-user
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # ── API URL — fill after deploy ───────────────────────────
      - key: VITE_API_URL
        sync: false           # eventadex-api URL
      - key: VITE_STRIPE_PUBLIC_KEY
        sync: false           # pk_live_… or pk_test_…
      - key: VITE_RECAPTCHA_SITE_KEY
        sync: false           # from https://www.google.com/recaptcha/admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
