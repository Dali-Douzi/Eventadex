version: '3.9'

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: event_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Express API server ────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: event_server
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/registration-app
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx (serves built React apps + proxies /api to server) ─────────────────
  nginx:
    image: nginx:alpine
    container_name: event_nginx
    restart: unless-stopped
    ports:
      - "3000:3000"   # client-master
      - "3001:3001"   # client-admin
      - "3002:3002"   # client-user
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client-master/dist:/usr/share/nginx/html/master:ro
      - ./client-admin/dist:/usr/share/nginx/html/admin:ro
      - ./client-user/dist:/usr/share/nginx/html/user:ro
    networks:
      - app-network
    depends_on:
      server:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
  uploads_data:
